<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ro'yxatdan O'tish | EduGravity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; align-items: center;">
    <div class="theme-toggle" onclick="toggleTheme()">🌙</div>
    <div class="lang-switcher">
      <span>UZ</span>
      <div class="lang-dropdown">
        <div class="lang-opt" onclick="setLanguage('uz')">O'zbekcha</div>
        <div class="lang-opt" onclick="setLanguage('ru')">Русский</div>
        <div class="lang-opt" onclick="setLanguage('en')">English</div>
      </div>
    </div>
  </div>

  <div class="glass-card" style="width: 100%; max-width: 500px; padding: 3rem; text-align: center;">
    <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="3"/>
        <path d="M20 10L10 25H30L20 10Z" fill="white"/>
      </svg>
      <span style="font-size: 2rem;">EduGravity</span>
    </div>
    <h2 style="font-size: 1.5rem; margin-bottom: 2rem; -webkit-text-fill-color: #fff;">Yangi Profil Ochish</h2>
    
    <form id="registerForm">
      <div style="margin-bottom: 1.2rem; text-align: left;">
        <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">F.I.SH</label>
        <input type="text" placeholder="Ism familiyangiz" required style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none;">
      </div>
      
      <div style="margin-bottom: 1.2rem; text-align: left;">
        <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">Rolingizni tanlang</label>
        <select required style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none;">
           <option value="student">Talaba</option>
           <option value="teacher">O'qituvchi</option>
           <option value="uni">Xususiy Universitet</option>
        </select>
      </div>

      <div style="margin-bottom: 1.2rem; text-align: left;">
        <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">Login</label>
        <input type="text" placeholder="user123" required style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none;">
      </div>

      <div style="margin-bottom: 2rem; text-align: left;">
        <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;">Parol</label>
        <input type="password" placeholder="********" required style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none;">
      </div>

      <button type="submit" class="btn-premium" style="width: 100%; padding: 15px; font-size: 1rem;">Ro'yxatdan O'tish</button>
    </form>

    <div style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
      Profil bormi? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Kirish</a>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Tabriklaymiz! Ro\'yxatdan o\'tish muvaffaqiyatli yakunlandi. Endi tizimga kirishingiz mumkin.');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
