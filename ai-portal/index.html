<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portal | EduGravity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: rgba(30,41,59,0.7); --border: rgba(255,255,255,0.08); --text: #e2e8f0; --muted: #94a3b8; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body { background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .glow { position:fixed; border-radius:50%; filter:blur(100px); opacity:0.15; z-index:-1; }
        .g1 { width:60vw; height:60vw; top:-20%; right:-10%; background:var(--primary); }
        .g2 { width:50vw; height:50vw; bottom:-20%; left:-10%; background:#9333ea; }
        .card { background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:32px; padding:60px; width:100%; max-width:480px; text-align:center; box-shadow:0 40px 100px rgba(0,0,0,0.5); }
        .logo-icon { width:70px; height:70px; background:var(--primary); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:1.4rem; font-weight:800; }
        h1 { font-size:1.8rem; font-weight:800; margin-bottom:8px; }
        p.sub { color:var(--muted); font-size:0.9rem; margin-bottom:40px; }
        .input-group { text-align:left; margin-bottom:24px; }
        label { display:block; font-size:0.7rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
        input { width:100%; padding:16px 20px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:12px; color:#fff; font-size:1rem; transition:0.3s; }
        input:focus { border-color:var(--primary); outline:none; }
        .btn { width:100%; padding:18px; background:var(--primary); border:none; border-radius:12px; color:#fff; font-size:1rem; font-weight:800; cursor:pointer; transition:0.3s; }
        .btn:hover { transform:translateY(-3px); box-shadow:0 15px 30px rgba(99,102,241,0.4); }
        .err { display:none; color:#ff6b6b; margin-top:16px; font-weight:700; font-size:0.85rem; }
        .toggle-p { margin-top:28px; color:var(--muted); font-size:0.9rem; }
        .toggle-p span { color:var(--primary); cursor:pointer; font-weight:800; border-bottom:1px solid var(--primary); }
    </style>
</head>
<body>
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="card">
        <div class="logo-icon">EG</div>
        <h1 id="authTitle">Tizimga Kirish</h1>
        <p class="sub">EduGravity AI Cloud Portal</p>
        <form id="authForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="user@edugravity.uz" required>
            </div>
            <div class="input-group">
                <label>Parol</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" id="authBtn">Kirish</button>
        </form>
        <div class="err" id="errBox"></div>
        <p class="toggle-p">Profilingiz yo'qmi? <span onclick="toggleMode()">Ro'yxatdan O'tish</span></p>
    </div>

    <script>
        const SB_URL = "https://ushonvjezpovomkdivbw.supabase.co";
        const SB_KEY = "sb_publishable_7crDnMqPVtKwIX3R2l4uxQ_1o5JEGkJ";
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? 'Tizimga Kirish' : "Ro'yxatdan O'tish";
            document.getElementById('authBtn').innerText = isLogin ? 'Kirish' : "Ro'yxatdan O'tish";
            document.querySelector('.toggle-p').innerHTML = isLogin
                ? "Profilingiz yo'qmi? <span onclick='toggleMode()'>Ro'yxatdan O'tish</span>"
                : "Profilingiz bormi? <span onclick='toggleMode()'>Kirish</span>";
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authBtn');
            const err = document.getElementById('errBox');
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            btn.innerText = 'Connecting...'; btn.disabled = true;
            err.style.display = 'none';

            try {
                let res;
                if (isLogin) {
                    res = await _sb.auth.signInWithPassword({ email, password: pass });
                } else {
                    res = await _sb.auth.signUp({ email, password: pass, options: { data: { role: 'student', full_name: email.split('@')[0] } } });
                }
                if (res.error) throw res.error;
                if (!isLogin) { alert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Kirish sahifasiga o'ting."); toggleMode(); }
                else { window.location.href = 'dashboard.html'; }
            } catch (e) {
                err.innerText = '❌ ' + e.message;
                err.style.display = 'block';
            }
            btn.innerText = isLogin ? 'Kirish' : "Ro'yxatdan O'tish";
            btn.disabled = false;
        });
    </script>
</body>
</html>
