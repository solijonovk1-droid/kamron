<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGravity Portal | Intellektual Ta'lim</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .data-table-premium {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: 20px;
        }

        .data-table-premium th {
            padding: 15px;
            color: #64748b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
        }

        .data-table-premium tr {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            transition: all 0.3s;
        }

        .data-table-premium tr:hover {
            background: rgba(59, 130, 246, 0.05);
            transform: translateX(5px);
        }

        .data-table-premium td {
            padding: 20px 15px;
            color: #e2e8f0;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .data-table-premium td:first-child {
            border-radius: 15px 0 0 15px;
        }

        .data-table-premium td:last-child {
            border-radius: 0 15px 15px 0;
        }

        .grade-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.8rem;
        }

        .grade-5 {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .grade-4 {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .grade-3 {
            background: rgba(255, 165, 0, 0.1);
            color: #ffa500;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }

        .card-grid-colleges {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .uni-card-premium {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            transition: 0.4s;
        }

        .uni-card-premium:hover {
            border-color: #3b82f6;
            transform: translateY(-10px);
            background: rgba(59, 130, 246, 0.03);
        }

        .uni-card-premium img {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid rgba(59, 130, 246, 0.2);
        }
    </style>
</head>

<body>
    <div id="landing-view">
        <div class="bg-glow glow-1"></div>
        <div class="bg-glow glow-2"></div>
        <nav>
            <div class="logo"><svg width="30" height="30" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="3" />
                    <path d="M20 10L10 25H30L20 10Z" fill="white" />
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y2="40">
                            <stop stop-color="#3b82f6" />
                            <stop offset="1" stop-color="#9333ea" />
                        </linearGradient>
                    </defs>
                </svg><span>EduGravity</span></div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Asosiy</a></li>
                <li><a href="jobs.html">Ish Kafolati</a></li>
            </ul>
            <div class="nav-actions">
                <div class="theme-toggle" onclick="toggleTheme()">🌙</div><button class="btn-premium"
                    onclick="window.location.href='login.html'">Kirish</button>
            </div>
        </nav>
        <section class="hero" style="min-height: 90vh; display: flex; align-items: center; justify-content: center;">
            <div style="text-align: center; max-width: 900px;">
                <div class="hero-badge">Bitirguncha Ish Kafolati 100%</div>
                <h1
                    style="font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 2rem;">
                    EduGravity <span style="color: var(--primary);">Intellektual</span> Ta'lim Tizimi</h1>
                <p style="color: var(--text-muted); font-size: 1.2rem; margin-bottom: 3rem;">Talabalar uchun baholar
                    reytingi va o'qituvchilar uchun aqlli boshqaruv tizimi.</p>
                <div style="display: flex; gap: 20px; justify-content: center;"><a href="register.html"
                        class="btn-premium"
                        style="padding: 18px 45px; text-decoration: none; border-radius: 40px;">Karyerani Boshlash</a>
                </div>
            </div>
        </section>
    </div>

    <div id="dash-portal-wrapper" class="dash-portal-wrapper">
        <aside class="dash-sidebar-premium" id="sidebar-container"></aside>
        <main class="portal-main">
            <header class="portal-header">
                <div class="portal-path" id="portal-path">Dashboard</div>
                <div class="portal-user-chip"><span id="headerUserName"
                        style="font-weight: 700; font-size: 0.9rem;">User</span><img id="headerUserAvatar" src=""
                        class="portal-avatar-mini"></div>
            </header>
            <div id="dashboard-content" style="padding: 40px;"></div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        let curRole = '', curName = '';
        (function () {
            curRole = localStorage.getItem('userRole'); curName = localStorage.getItem('userName') || 'User';
            if (curRole) { document.getElementById('landing-view').style.display = 'none'; document.getElementById('dash-portal-wrapper').style.display = 'flex'; renderDash(curRole, curName); }
        })();

        function renderDash(role, name) {
            const sb = document.getElementById('sidebar-container'); const lang = localStorage.getItem('selectedLang') || 'uz'; const t = translations[lang];
            document.getElementById('headerUserName').innerText = name;
            document.getElementById('headerUserAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;

            let menus = [];
            if (role === 'admin') menus = [{ id: 'system', ic: '👨‍💻', lbl: t.sidebar_system }, { id: 'users', ic: '👥', lbl: t.sidebar_users }, { id: 'colleges', ic: '🏛️', lbl: t.sidebar_colleges }, { id: 'tools', ic: '🛠️', lbl: t.sidebar_tools }];
            else if (role === 'teacher') menus = [{ id: 't_dash', ic: '👨‍🏫', lbl: 'Dashboard' }, { id: 't_groups', ic: '👥', lbl: 'Guruhlar' }, { id: 't_grades', ic: '📝', lbl: 'Baholash' }];
            else if (role === 'uni') menus = [{ id: 'u_dash', ic: '🏛️', lbl: 'Dashboard' }, { id: 'u_search', ic: '🔍', lbl: 'Talant Qidirish' }, { id: 'u_stats', ic: '📈', lbl: 'Statistika' }];
            else menus = [{ id: 'dash', ic: '🏠', lbl: t.sidebar_dashboard }, { id: 'grades', ic: '📑', lbl: t.sidebar_grades }, { id: 'rank', ic: '📊', lbl: t.sidebar_ranking }, { id: 'prof', ic: '👤', lbl: t.sidebar_profile }];

            sb.innerHTML = `<div class="portal-logo"><svg width="30" height="30" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="url(#logoG)" stroke-width="3"/><path d="M20 10L10 25H30L20 10Z" fill="white"/><defs><linearGradient id="logoG" x1="0" y2="40"><stop stop-color="#3b82f6"/><stop offset="1" stop-color="#9333ea"/></linearGradient></defs></svg><span>EduGravity</span></div>
                <ul class="portal-menu">${menus.map((m, i) => `<li class="portal-menu-item ${i === 0 ? 'active' : ''}" id="m-${m.id}" onclick="switchView('${m.id}')"><a href="#" class="portal-link"><span>${m.ic}</span> <span>${m.lbl}</span></a></li>`).join('')}</ul>
                <div class="portal-sidebar-footer"><a href="#" class="portal-link" onclick="handleLogout()"><span>🚪</span> <span>${t.logout_btn}</span></a></div>`;
            switchView(menus[0].id);
        }

        function switchView(v) {
            const c = document.getElementById('dashboard-content'); const p = document.getElementById('portal-path'); const lang = localStorage.getItem('selectedLang') || 'uz'; const t = translations[lang];
            document.querySelectorAll('.portal-menu-item').forEach(m => m.classList.remove('active'));
            const el = document.getElementById('m-' + v); if (el) el.classList.add('active');

            if (curRole === 'admin') {
                if (v === 'system') { p.innerText = 'Admin / Control Center'; c.innerHTML = ` <div style="display:grid; grid-template-columns:2.5fr 1fr; gap:40px; margin-bottom:40px;"><div><h1 class="welcome-hero-h1">Salom, Admin 👋</h1><p class="welcome-hero-p">Tizim holati va umumiy nazorat.</p></div><div class="gpa-high-fid-card" style="background:rgba(0,255,136,0.05); border-color:#00ff8833;"><div><div class="gpa-value-display" style="color:#00ff88">System: OK</div><div class="gpa-progress-pill-html"><div class="gpa-progress-fill-html" style="width:98%; background:#00ff88;"></div></div></div><span>⚡</span></div></div><div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:20px;">${[{ v: '1,240', l: t.stats_students, i: '👥' }, { v: '45', l: t.stats_unis, i: '🏛️' }, { v: '186', l: t.stats_teachers, i: '👨‍🏫' }, { v: '12', l: t.stats_pending, i: '🎫' }].map(s => `<div class="portal-card-glass"><b>${s.v}</b> <small style="display:block; opacity:0.6;">${s.l}</small></div>`).join('')}</div>`; }
                else if (v === 'users') { p.innerText = 'Admin / Users'; c.innerHTML = `<div class="portal-card-glass"><h2>Foydalanuvchilar</h2><table class="data-table-premium"><thead><tr><th>Nomi</th><th>Login</th><th>Roli</th></tr></thead><tbody>${Object.entries(JSON.parse(localStorage.getItem('registeredUsers') || '{}')).map(([u, d]) => `<tr><td>${d.name}</td><td>${u}</td><td><span class="grade-badge grade-4">${d.role}</span></td></tr>`).join('')}</tbody></table></div>`; }
            } else if (curRole === 'teacher') {
                if (v === 't_dash') { p.innerText = 'Teacher / Dashboard'; c.innerHTML = `<h1>Assalomu alaykum, Ustoz!</h1><p class="welcome-hero-p">Guruhlardagi o\'rtacha o\'zlashtirish: 88%</p><div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; margin-top:30px;"><div class="portal-card-glass"><b>CS-102</b> <small>4.8 Avg GPA</small></div><div class="portal-card-glass"><b>CS-103</b> <small>4.2 Avg GPA</small></div><div class="portal-card-glass"><b>Pending</b> <small>12 Homeworks</small></div></div>`; }
                else if (v === 't_groups') { p.innerText = 'Teacher / Groups Management'; c.innerHTML = `<div class="portal-card-glass"><h2>Mening guruhlarim</h2><div style="display:grid; grid-template-columns:repeat(2,1fr); gap:20px; margin-top:2rem;"><div class="portal-card-glass"><h3>Computer Science (CS-102)</h3><p>Talabalar: 24</p><button class="btn-premium">Ro'yxatni ko'rish</button></div><div class="portal-card-glass"><h3>Data Science (DS-105)</h3><p>Talabalar: 18</p><button class="btn-premium">Ro'yxatni ko'rish</button></div></div></div>`; }
                else if (v === 't_grades') { p.innerText = 'Teacher / Assessment'; c.innerHTML = `<div class="portal-card-glass"><h2>Baholash (CS-102)</h2><table class="data-table-premium"><thead><tr><th>F.I.SH</th><th>Oxirgi Baho</th><th>Amal</th></tr></thead><tbody><tr><td>Sardor Karimov</td><td>5</td><td><button class="btn-premium" style="padding:10px 20px;">Baho qo'shish +</button></td></tr><tr><td>Madina Akramova</td><td>4+</td><td><button class="btn-premium" style="padding:10px 20px;">Baho qo'shish +</button></td></tr></tbody></table></div>`; }
            } else if (curRole === 'uni') {
                if (v === 'u_dash') { p.innerText = 'University / Portal'; c.innerHTML = `<h1>${curName} Dashboard</h1><p class="welcome-hero-p">Jami taqdim etilgan grantlar: 15 ta</p><div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; margin-top:30px;"><div class="portal-card-glass"><b>Offers</b> <small>12 Accepted</small></div><div class="portal-card-glass"><b>Budget</b> <small>$45,000 Left</small></div></div>`; }
                else if (v === 'u_search') { p.innerText = 'University / Talent Hunter'; c.innerHTML = `<div class="portal-card-glass"><h2>Iqtidorli talabalarni topish</h2><p style="margin-bottom:20px;">Reytingi baland lekin to'lov-shartnoma asosida o'qiydigan talabalarga grant taklif qiling.</p><table class="data-table-premium"><thead><tr><th>F.I.SH</th><th>GPA</th><th>Status</th><th>Amal</th></tr></thead><tbody><tr><td>Kamron K.</td><td>4.95</td><td>Contract</td><td><button class="btn-premium">Offer Grant</button></td></tr></tbody></table></div>`; }
                else if (v === 'u_stats') { p.innerText = 'University / Analytics'; c.innerHTML = `<div class="portal-card-glass"><h2>Universitet Statistikasi</h2><div style="height:200px; background:linear-gradient(rgba(59,130,246,0.1), transparent); margin:2rem 0; border-radius:20px; border:1px dashed rgba(59,130,246,0.3); display:flex; align-items:center; justify-content:center;">📈 Global O'zlashtirish Grafigi</div><div style="display:grid; grid-template-columns:repeat(2,1fr); gap:20px;"><div class="portal-card-glass"><b>Grants</b> <small>85% Success Rate</small></div><div class="portal-card-glass"><b>Enrollment</b> <small>+24% this year</small></div></div></div>`; }
            } else {
                if (v === 'dash') { p.innerText = 'Academy / Dashboard'; c.innerHTML = `<div style="display:grid; grid-template-columns:2.5fr 1fr; gap:40px; margin-bottom:40px;"><div><h1 class="welcome-hero-h1">${t.dash_greeting_student.replace('{name}', curName.split(' ')[0])}</h1><p class="welcome-hero-p">Bugungi o'quv ko'rsatkichi: <b>Alo</b></p></div><div class="gpa-high-fid-card"><div><div class="gpa-value-display">GPA: 3.9 ★</div><div class="gpa-progress-pill-html"><div class="gpa-progress-fill-html" style="width:78%"></div></div></div><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${curName}" style="width:80px; height:80px; border-radius:20px;"></div></div><div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:20px;">${[{ v: '95%', l: 'Attendance', i: '🎯' }, { v: '24/30', l: 'Credits', i: '📜' }, { v: '88%', l: 'Assignments', i: '📝' }, { v: 'TOP-3', l: 'Global Rank', i: '🏆' }].map(s => `<div class="portal-card-glass"><b>${s.v}</b> <small style="display:block; opacity:0.6;">${s.l}</small></div>`).join('')}</div>`; }
                else if (v === 'grades') { p.innerText = 'Academy / Transcript'; c.innerHTML = `<div class="portal-card-glass"><h2>Baholar Transcripti</h2><table class="data-table-premium"><thead><tr><th>Fan</th><th>Baho</th><th>Sana</th></tr></thead><tbody><tr><td>AI Foundations</td><td><span class="grade-badge grade-5">5</span></td><td>27-Mart</td></tr><tr><td>DB Systems</td><td><span class="grade-badge grade-4">4+</span></td><td>24-Mart</td></tr></tbody></table></div>`; }
                else if (v === 'prof') { p.innerText = 'Academy / Profile'; c.innerHTML = `<div class="portal-card-glass" style="max-width:800px; display:flex; gap:40px; padding:60px;"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${curName}" style="width:150px; height:150px; border-radius:30px;"><div style="flex:1;"><h1>${curName}</h1><p style="color:#3b82f6; font-weight:800;">${curRole.toUpperCase()}</p><button class="btn-premium" style="margin-top:40px; width:100%;">Sozlamalar</button></div></div>`; }
            }
        }
        async function handleLogout() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('userName');
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
