<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish | EduGravity</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #020617; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; }
    .auth-window { width: 100%; max-width: 1100px; min-height: 700px; background: #0b0c14; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; overflow: hidden; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5); }
    .visual-side { flex: 1.2; background: linear-gradient(135deg, #1e293b, #0f172a); position: relative; padding: 60px; display: flex; flex-direction: column; justify-content: flex-end; }
    .visual-content { position: relative; z-index: 2; }
    .visual-content h1 { font-size: 2.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; color: #fff; }
    .visual-content p { font-size: 1.1rem; opacity: 0.6; font-weight: 500; color: #fff; }
    .form-side { flex: 1; padding: 40px 60px; display: flex; flex-direction: column; justify-content: center; background: #0b0c14; }
    .form-header h2 { font-size: 2.6rem; font-weight: 800; margin-bottom: 10px; color: #fff; }
    .form-header p { color: #64748b; font-weight: 600; font-size: 1rem; margin-bottom: 30px; }
    .form-header span { color: #3b82f6; cursor: pointer; text-decoration: underline; font-weight: 700; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 0.7rem; font-weight: 900; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .input-field { width: 100%; padding: 16px 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px; color: #fff; font-size: 1rem; font-weight: 500; transition: 0.3s; }
    .input-field:focus { border-color: #6366f1; background: rgba(99,102,241,0.03); outline: none; }
    .submit-btn { width: 100%; padding: 18px; background: #6366f1; border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .submit-btn:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
    #authError { display: none; color: #ff6b6b; margin-top: 20px; font-weight: 700; font-size: 0.85rem; text-align: center; padding: 10px; border-radius: 8px; background: rgba(255, 107, 107, 0.1); }
    
    .demo-info { margin-top: 30px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
    .demo-info h4 { font-size: 0.8rem; color: #64748b; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.75rem; }
    .demo-item { color: #94a3b8; cursor: pointer; transition: 0.2s; }
    .demo-item:hover { color: #fff; }
    .demo-item b { color: #6366f1; }

    @media (max-width: 900px) {
      .visual-side { display: none; }
      .auth-window { max-width: 500px; height: auto; min-height: unset; }
    }
  </style>
</head>
<body>
  <div class="auth-window">
    <div class="visual-side">
      <div style="position:absolute; top:40px; left:40px; font-weight:900; font-size:1.8rem; color:#6366f1;">EduGravity</div>
      <div class="visual-content">
        <h1>Cloud-Powered <br> Intelligent Education</h1>
        <p>Tizimga kirish uchun demo ma'lumotlardan foydalaning.</p>
      </div>
    </div>
    <div class="form-side">
      <header class="form-header">
        <h2>Kirish</h2>
        <p>Profilingiz yo'qmi? <span onclick="window.location.href='register.html'">Ro'yxatdan o'tish</span></p>
      </header>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email yoki Login</label>
          <input type="text" id="username" class="input-field" placeholder="student / admin / teacher" required>
        </div>
        <div class="form-group">
          <label class="form-label">Parol</label>
          <input type="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn" id="loginSubmitBtn">Tizimga Kirish</button>
      </form>
      <div id="authError">❌ Login yoki parol noto'g'ri!</div>

      <div class="demo-info">
        <h4>Demo Ma'lumotlar (Bosing):</h4>
        <div class="demo-grid">
          <div class="demo-item" onclick="fillDemo('admin', 'admin123')">Admin: <b>admin / admin123</b></div>
          <div class="demo-item" onclick="fillDemo('student', '123')">Talaba: <b>student / 123</b></div>
          <div class="demo-item" onclick="fillDemo('teacher', '123')">Ustoz: <b>teacher / 123</b></div>
          <div class="demo-item" onclick="fillDemo('uni', 'uni123')">OTM: <b>uni / uni123</b></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    (function() {
      const role = localStorage.getItem('userRole');
      if (role) {
        if (role === 'admin') window.location.replace('admin-dashboard.html');
        else if (role === 'uni') window.location.replace('uni-dashboard.html');
        else if (role === 'teacher') window.location.replace('teacher-dashboard.html');
        else if (role === 'student') window.location.replace('student-dashboard.html');
      }
    })();

    function fillDemo(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('loginSubmitBtn');
      const err = document.getElementById('authError');

      btn.innerText = 'Tekshirilmoqda...';
      btn.disabled = true;
      err.style.display = 'none';

      // Default demo users
      const defaultUsers = {
        'admin': { pass: 'admin123', role: 'admin', name: 'Tizim Admini' },
        'teacher': { pass: '123', role: 'teacher', name: 'Prof. Alisherov N.' },
        'student': { pass: '123', role: 'student', name: 'Sardor Karimov' },
        'uni': { pass: 'uni123', role: 'uni', name: 'Amity University' },
        'madina': { pass: '123', role: 'student', name: 'Madina Akramova' },
        'malikova': { pass: '123', role: 'teacher', name: 'Dr. Malikova J.' }
      };

      // Get registered users from localStorage
      const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers') || '{}');
      const allUsers = Object.assign({}, defaultUsers, registeredUsers);

      setTimeout(function() {
        if (allUsers[user] && allUsers[user].pass === pass) {
          localStorage.setItem('userRole', allUsers[user].role);
          localStorage.setItem('currentUser', user);
          localStorage.setItem('userName', allUsers[user].name || user);
          
          if (allUsers[user].role === 'admin') window.location.href = 'admin-dashboard.html';
          else if (allUsers[user].role === 'uni') window.location.href = 'uni-dashboard.html';
          else if (allUsers[user].role === 'teacher') window.location.href = 'teacher-dashboard.html';
          else if (allUsers[user].role === 'student') window.location.href = 'student-dashboard.html';
        } else {
          err.style.display = 'block';
          btn.innerText = 'Tizimga Kirish';
          btn.disabled = false;
        }
      }, 800);
    });
  </script>
</body>
</html>
