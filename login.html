<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish | EduGravity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;">
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; align-items: center;">
    <div class="theme-toggle" onclick="toggleTheme()">🌙</div>
    <div class="lang-switcher">
      <span>UZ</span>
      <div class="lang-dropdown">
        <div class="lang-opt" onclick="setLanguage('uz')">O'zbekcha</div>
        <div class="lang-opt" onclick="setLanguage('ru')">Русский</div>
        <div class="lang-opt" onclick="setLanguage('en')">English</div>
      </div>
    </div>
  </div>

  <div class="glass-card" style="width: 100%; max-width: 450px; padding: 3rem; text-align: center;">
    <div class="logo" style="justify-content: center; margin-bottom: 2rem;">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="3"/>
        <path d="M20 10L10 25H30L20 10Z" fill="white"/>
      </svg>
      <span style="font-size: 2rem;">EduGravity</span>
    </div>
    <h2 style="font-size: 1.5rem; margin-bottom: 2rem; -webkit-text-fill-color: #fff;" data-i18n="login_title">Tizimga Kirish</h2>
    
    <form id="loginForm">
      <div style="margin-bottom: 1.5rem; text-align: left;">
        <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;" data-i18n="login_user_label">Login</label>
        <input type="text" id="username" placeholder="Foydalanuvchi nomi" required style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none;" data-i18n-hold="login_user_ph">
      </div>
      <div style="margin-bottom: 2rem; text-align: left;">
        <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px;" data-i18n="login_pass_label">Parol</label>
        <input type="password" id="password" placeholder="********" required style="width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; outline: none;">
      </div>
      <button type="submit" class="btn-premium" style="width: 100%; padding: 15px; font-size: 1rem;" data-i18n="btn_login">Kirish</button>
    </form>

    <div style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);" data-i18n="login_no_acc">
      Hali profil yo'qmi? <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Ro'yxatdan O'tish</a>
    </div>

    <div id="adminTips" style="display: none; margin-top: 2rem; font-size: 0.8rem; color: var(--text-muted);">
      <p>Test rejimi uchun:</p>
      <p>Admin: <b>admin</b> / <b>admin123</b></p>
      <p>Unversitet: <b>uni</b> / <b>uni123</b></p>
      <p>Ustoz: <b>teacher</b> / <b>123</b></p>
      <p>Talaba: <b>student</b> / <b>123</b></p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      const users = {
        'solijonovk1@gmail.com': { pass: 'admin123', role: 'admin' },
        'teacher': { pass: '123', role: 'teacher' },
        'student': { pass: '123', role: 'student' },
        'uni': { pass: 'uni123', role: 'uni' },
        'madina': { pass: '123', role: 'student' },
        'malikova': { pass: '123', role: 'teacher' },
        'amity': { pass: 'amity123', role: 'uni' },
        'inha': { pass: 'inha123', role: 'uni' },
        'webster': { pass: 'webster123', role: 'uni' }
      };

      if (users[user] && users[user].pass === pass) {
        localStorage.setItem('userRole', users[user].role);
        localStorage.setItem('currentUser', user);
        
        // Check for temporary password
        const isChanged = localStorage.getItem('passChanged_' + user);
        if (!isChanged && user !== 'admin') {
           alert('Siz vaqtinchalik paroldan foydalanyapsiz. Iltimos, xavfsizlik uchun yangi parol o\'rnating!');
        }

        if (users[user].role === 'admin') window.location.href = 'admin-dashboard.html';
        else if (users[user].role === 'uni') window.location.href = 'uni-dashboard.html';
        else if (users[user].role === 'teacher') window.location.href = 'teacher-dashboard.html';
        else if (users[user].role === 'student') window.location.href = 'student-dashboard.html';
      } else {
        alert('Login yoki parol noto\'g\'ri!');
      }
    });

    // Secret: Reveal test credentials by clicking logo 3 times
    let clickCount = 0;
    document.querySelector('.logo').addEventListener('click', function() {
      clickCount++;
      if (clickCount >= 3) {
        document.getElementById('adminTips').style.display = 'block';
        clickCount = 0;
        alert('Admin rejimi faollashtirildi: Test parollari ko\'rsatilmoqda.');
      }
      setTimeout(() => { clickCount = 0; }, 3000); // Reset after 3 seconds
    });
  </script>
</body>
</html>
